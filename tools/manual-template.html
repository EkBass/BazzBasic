<!DOCTYPE html>
<html lang="$lang$">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: #000066;
      background: #e6e6e6;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 270px;
      height: 100vh;
      overflow-y: auto;
      background: #0b7a2a;
      border-right: 2px solid #096b24;
      padding: 0 0 40px 0;
      z-index: 100;
    }

    #sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #096b24;
      background: #096b24;
      margin-bottom: 8px;
    }

    #sidebar-logo img {
      width: 36px;
      height: 36px;
      border-radius: 6px;
    }

    #sidebar-logo span {
      font-size: 1.15em;
      font-weight: 700;
      color: #ffd84a;
      letter-spacing: 1px;
    }

    #sidebar nav { padding: 0 6px; }

    #sidebar nav ul { list-style: none; }

    #sidebar nav ul li a {
      display: block;
      padding: 4px 12px;
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.87em;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar nav ul li a:hover {
      background: #096b24;
      color: #ffd84a;
    }

    /* Top-level items */
    #sidebar nav > ul > li > a {
      font-weight: 600;
      font-size: 0.9em;
      color: #ffffff;
    }

    /* Sub-items */
    #sidebar nav ul ul li a {
      padding-left: 26px;
      font-size: 0.84em;
      color: rgba(255,255,255,0.78);
    }

    /* Scrollbar */
    #sidebar::-webkit-scrollbar { width: 5px; }
    #sidebar::-webkit-scrollbar-track { background: #0b7a2a; }
    #sidebar::-webkit-scrollbar-thumb { background: #096b24; border-radius: 3px; }

    /* ── Main content ── */
    #content {
      margin-left: 270px;
      padding: 40px 60px 80px 60px;
      max-width: 980px;
      width: 100%;
      background: #e6e6e6;
    }

    /* ── Headings ── */
    h1, h2, h3, h4, h5, h6 {
      color: #0b7a2a;
      margin-top: 2em;
      margin-bottom: 0.5em;
      line-height: 1.3;
    }
    h1 { font-size: 2em;   border-bottom: 2px solid #0b7a2a; padding-bottom: 8px; }
    h2 { font-size: 1.5em; border-bottom: 1px solid #c0c0c0; padding-bottom: 4px; }
    h3 { font-size: 1.15em; color: #0d9932; }
    h4 { font-size: 1em;    color: #000066; font-weight: 700; }

    p { margin: 0.8em 0; color: #000066; }

    a { color: #0b7a2a; text-decoration: none; }
    a:hover { text-decoration: underline; color: #0d9932; }

    strong { color: #000044; }

    /* ── Code ── */
    code {
      font-family: 'Cascadia Code', 'Consolas', 'Fira Mono', monospace;
      font-size: 0.9em;
      background: #2b2b2b;
      color: #f8f8f2;
      padding: 2px 6px;
      border-radius: 4px;
    }

    pre {
      background: #2b2b2b;
      border-left: 4px solid #0b7a2a;
      border-radius: 4px;
      padding: 14px 18px;
      overflow-x: auto;
      margin: 1em 0;
    }

    pre code {
      background: transparent;
      padding: 0;
      color: #f8f8f2;
      font-size: 0.87em;
    }

    /* Pandoc syntax highlight classes */
    .kw { color: #66d9e8; font-weight: bold; }
    .dt { color: #ffd84a; }
    .dv { color: #a6e22e; }
    .st { color: #e6db74; }
    .co { color: #888888; font-style: italic; }
    .fu { color: #a6e22e; }
    .op { color: #f8f8f2; }
    .cf { color: #f92672; font-weight: bold; }
    .bn { color: #ae81ff; }

    /* ── Tables ── */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      background: #f0f0f0;
    }

    th {
      background: #0b7a2a;
      color: #ffd84a;
      padding: 9px 14px;
      text-align: left;
      font-size: 0.87em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    td {
      padding: 7px 14px;
      border-bottom: 1px solid #cccccc;
      font-size: 0.9em;
      color: #000066;
    }

    tr:nth-child(even) td { background: #e0e0e0; }
    tr:hover td { background: #d4eedd; }

    /* ── Blockquote ── */
    blockquote {
      border-left: 4px solid #0b7a2a;
      margin: 1em 0;
      padding: 8px 16px;
      background: #d4eedd;
      color: #003300;
      border-radius: 0 4px 4px 0;
    }

    ul, ol { margin: 0.5em 0 0.5em 1.5em; }
    li { margin: 0.25em 0; color: #000066; }

    hr {
      border: none;
      border-top: 1px solid #bbbbbb;
      margin: 2em 0;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #content { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-logo">
    <img src="docs/manual/icon.png" alt="BazzBasic">
    <span>BazzBasic</span>
  </div>
  <nav>
$table-of-contents$
  </nav>
</div>

<div id="content">
$body$
</div>

</body>
</html>
