# BazzBasic syntax for Geany editor
# Lets just borrow FB here
# krisu.virtanen@gmail.com
# https://github.com/EkBass/BazzBasic
# For version 1.3b. Updated 30.04.2027 by EkBass

[file]
extension=bas;bb
# FB lexer does the job nicely
lexer_filetype=FreeBasic
[styling=FreeBasic]

[keywords]
# Group 1 (Keywords1: Control Flow)
keywords=def dim end endif else elseif fn for gosub goto if include let next rem return step then to wend while
# Group 2 (Keywords2: I/O & Screen)
word2=cls color curpos getconsole input locate sleep print inkey keydown waitkey fileread fileexists filewrite fileappend filedelete shell base64encode base64decode sha256 mousex mousey mouseleft mouseright mousemiddle 
# Group 3 (Keywords3: Graphics & Sound)
word3= b bf circle drawshape hideshape line loadimage loadshape moveshape paint point pset rgb removeshape rotateshape scaleshape screen screenlock showshape vsync fullscreen loadsheet loadsound soundonce soundoncewait soundrepeat soundstop soundstopall
# Group 4 (Keywords 5-8: Funktiot logiikka ja muut)
word4=isset httpget httppost asjson loadjson savejson abs atan cint cos ceil exp floor fstring int log max min mod pow rnd round sgn sin sqr tan pi rad deg hpi fasttrig fastsin fastcos fastrad qpi tau between euler distance clamp lerp asc chr instr invert lcase left len ltrim mid repeat replace right rtrim srand split str trim ucase val delarray delkey haskey asarray join ticks time and false not off on or true beep bbver key_esc key_tab key_backspace key_enter key_space key_up key_down key_left key_right key_insert key_delete key_home key_end key_pgup key_pgdn key_f1 key_f2 key_f3 key_f4 key_f5 key_f6 key_f7 key_f8 key_f9 key_f10 key_f11 key_f12 key_numpad0 key_numpad1 key_numpad2 key_numpad3 key_numpad4 key_numpad5 key_numpad6 key_numpad7 key_numpad8 key_numpad9 key_lshift key_rshift key_lctrl key_rctrl key_lalt key_ralt key_lwin key_rwin key_0 key_1 key_2 key_3 key_4 key_5 key_6 key_7 key_8 key_9 key_a key_b key_c key_d key_e key_f key_g key_h key_i key_j key_k key_l key_m key_n key_o key_p key_q key_r key_s key_t key_u key_v key_w key_x key_y key_z key_sep key_equals key_comma key_minus key_dot key_slash key_grave key_lbracket key_rbracket key_backslash

[settings]
lexer_filetype=FreeBasic
comment_single='
#comment_open=/'
#comment_close='/
wordchars=_abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789

[indentation]
width=4
type=0